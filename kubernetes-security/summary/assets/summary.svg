<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="525" viewBox="0 0 1200 525" role="img" aria-label="Summary">
  <defs>
    <filter id="paper-14" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="4" seed="21" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="sketch-14" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#24383b" flood-opacity=".12"/>
    </filter>
  </defs>
  <style>
    .paper { fill: #fbf5e9; filter: url(#paper-14); }
    .wash { opacity: .36; }
    .dash, .thin, .accent-line { fill: none; stroke: #24383b; stroke-linecap: round; stroke-linejoin: round; }
    .dash { stroke-width: 4; stroke-dasharray: 13 16; }
    .thin { stroke-width: 4; }
    .accent-line { stroke: #347c7a; stroke-width: 5; }
    .node, .tower, .label { filter: url(#sketch-14); }
    .node *,.tower { stroke-width: 4; }
    .tower { rx: 8; }
    .label rect { fill: rgba(251,245,233,.88); stroke: #347c7a; stroke-width: 3; }
    .label text { fill: #24383b; font: 700 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { fill: #24383b; font: 800 38px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
  <rect class="paper" width="1200" height="525"/>
  <ellipse class="wash" cx="190" cy="155" rx="118" ry="86" fill="#a8cdb4"/>
  <ellipse class="wash" cx="630" cy="305" rx="170" ry="105" fill="#b9d2e7"/>
  <ellipse class="wash" cx="980" cy="145" rx="120" ry="86" fill="#e48d72"/>
  <path d="M85 414 C230 458 312 382 448 425 S715 482 877 414 S1040 390 1122 428" fill="none" stroke="#c8bda8" stroke-width="4" opacity=".45"/>
  <text class="title" x="64" y="72">Summary</text>
  
      <path class="dash" d="M210 300 C365 215 490 275 620 195 S790 135 970 240"/>
      <g class="node" transform="translate(250 270)"><path d="M-32 -44 H18 L36 -26 V44 H-32 Z" fill="#b9d2e7" stroke="#24383b"/><path d="M18 -44 V-26 H36 M-15 -8 H16 M-15 12 H20" class="thin"/></g>
      <g class="node" transform="translate(540 210)"><circle cx="-10" cy="-10" r="34" fill="#efc66f" stroke="#24383b"/><path d="M17 17 L48 48" class="thin"/><path d="M-24 -8 H5 M-24 9 H12" class="thin"/></g>
      <g class="node" transform="translate(820 225)"><path d="M0 -38 L36 -24 L36 10 Q36 44 0 60 Q-36 44 -36 10 L-36 -24 Z" fill="#a8cdb4" stroke="#24383b"/><path d="M-15 13 L-3 26 L21 -10" class="thin"/></g>
  <g class="label" transform="translate(90 108)">
    <rect x="0" y="0" width="160" height="46" rx="10"/>
    <text x="80" y="30" text-anchor="middle">Checklist</text>
  </g>
